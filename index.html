<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />

  <!-- Mobile Optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#FF6633" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preload Critical Assets for LCP -->
  <link rel="preload" as="image" href="/logo.svg" fetchpriority="high">

  <title>Stallioni - Top IT Outsourcing Company in India | Build Remote Teams</title>
  <meta name="description"
    content="Stallioni is a top IT outsourcing company in India. Hire dedicated Indian developers to build elite remote teams for web, mobile & AI solutions, cost-effectively." />

  <!-- SEO Tags -->
  <meta name="robots" content="index, follow" />

  <!-- Geo targeting — primary office is India, but we actively serve US/UK/AU/CA/AE -->
  <meta name="geo.region" content="IN-TN" />
  <meta name="geo.placename" content="Coimbatore, Tamil Nadu, India" />
  <meta name="geo.position" content="11.2735;77.1078" />
  <meta name="ICBM" content="11.2735, 77.1078" />

  <!-- Structured Data (JSON-LD) - Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Stallioni",
      "url": "https://www.stallioni.com/",
      "logo": "https://www.stallioni.com/logo.svg",
      "foundingDate": "2007",
      "sameAs": [
        "https://www.linkedin.com/in/sebastian-yesuraj/",
        "https://www.freelancer.com/u/graphicaa"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "978",
        "bestRating": "5",
        "worstRating": "1"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@stallioni.com",
        "contactType": "customer service",
        "availableLanguage": ["English"]
      }
    }
  </script>

  <!-- Structured Data (JSON-LD) - WebSite (Sitelink Searchbox) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Stallioni",
      "url": "https://www.stallioni.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.stallioni.com/services?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>


  <!-- Self-hosted Inter (variable, latin subset). Preloaded so the hero text
       (the mobile LCP element) gets its real font fast, instead of waiting on
       two external Google Fonts round-trips. -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url('/fonts/inter-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    /* Bare-minimum critical CSS for above-the-fold render. Full
       article-content + utility styles live in /index.css. */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <!-- Resource Hints for Performance -->
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://images.unsplash.com">
  <link rel="dns-prefetch" href="https://cdn.simpleicons.org">
  <link rel="dns-prefetch" href="https://flagcdn.com">


  <!-- Google tag (gtag.js) — loaded on idle so its 165KB doesn't compete with
       first paint / hydration. gtag() calls queue in dataLayer until it loads. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    (function () {
      // Skip under the headless prerenderer so the script isn't baked into the
      // prerendered HTML (which would defeat the defer for real users).
      if (navigator.webdriver) return;
      var loadGA = function () {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-WZ2SZ03V71';
        document.head.appendChild(s);
        gtag('config', 'G-WZ2SZ03V71');
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGA, { timeout: 5000 });
      } else {
        window.addEventListener('load', function () { setTimeout(loadGA, 2000); });
      }
    })();
  </script>
  <!-- Google reCAPTCHA v3 is loaded lazily on first form submit — see
       utils/recaptcha.ts. Loading it here eagerly blocked the main thread on
       every page even though it's only used in forms. -->

  <!-- Microsoft Clarity (heatmaps, session recordings, scroll/click analytics).
       Deferred until the browser is idle so it never competes with first paint
       or interaction on mobile. -->
  <script type="text/javascript">
    (function () {
      if (navigator.webdriver) return; // skip under the headless prerenderer
      var loadClarity = function () {
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wqcct5uxof");
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadClarity, { timeout: 5000 });
      } else {
        window.addEventListener('load', function () { setTimeout(loadClarity, 2000); });
      }
    })();
  </script>

  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-white font-sans">
  <div id="root"></div>




  <script type="module" src="/index.tsx"></script>
</body>

</html>
